# Production Configuration for Voice Feature Store

# Environment
environment: "production"
log_level: "INFO"

# Kafka Configuration
kafka:
  bootstrap_servers: "kafka-cluster:9092"
  topics:
    raw_audio: "voice.raw.audio"
    features: "voice.features"
    aggregated_features: "voice.features.aggregated"
    anomalies: "voice.anomalies"
  consumer_group: "voice-feature-processor"
  replication_factor: 3
  partitions: 12

# Redis Configuration
redis:
  host: "redis-cluster"
  port: 6379
  password: "${REDIS_PASSWORD}"
  ssl: true
  cluster_mode: true
  connection_pool:
    max_connections: 100
    timeout: 10

# AWS S3 Configuration
aws:
  region: "us-west-2"
  s3:
    bucket: "company-voice-data-prod"
    offline_path: "features/offline/"
    backup_path: "backups/feature-store/"
  credentials:
    access_key_id: "${AWS_ACCESS_KEY_ID}"
    secret_access_key: "${AWS_SECRET_ACCESS_KEY}"

# Feature Store Configuration
feature_store:
  name: "voice-analytics-prod"
  online_store:
    ttl_hours: 24
    compression: true
    cache_size: "2GB"
  offline_store:
    format: "parquet"
    compression: "snappy"
    partitioning:
      - "date"
      - "hour"
    retention_days: 365

# ML Model Configuration
ml:
  model_registry:
    path: "s3://company-ml-models/voice-analytics/"
    auto_versioning: true
  training:
    enabled: true
    max_concurrent_trains: 2
    resource_allocation:
      cpu: "4"
      memory: "8Gi"
  serving:
    cache_enabled: true
    cache_ttl: 300
    batch_size: 100

# API Configuration
api:
  host: "0.0.0.0"
  port: 8000
  workers: 8
  cors_origins:
    - "https://app.company.com"
    - "https://analytics.company.com"
  rate_limits:
    features_read: 1000  # requests per minute
    features_write: 500
    training_data: 100
    predictions: 2000

# Security Configuration
security:
  jwt:
    secret_key: "${JWT_SECRET_KEY}"
    algorithm: "HS256"
    expiration_minutes: 30
  rate_limiting:
    enabled: true
    storage: "redis"
  cors:
    enabled: true
    allow_origins: ["https://company.com"]

# Monitoring Configuration
monitoring:
  prometheus:
    enabled: true
    port: 9090
  alerting:
    enabled: true
    providers:
      slack:
        webhook_url: "${SLACK_WEBHOOK_URL}"
        channel: "#voice-alerts"
      pagerduty:
        integration_key: "${PAGERDUTY_KEY}"
      email:
        smtp_server: "smtp.company.com"
        from_email: "alerts@company.com"
        to_emails:
          - "ml-team@company.com"
          - "oncall@company.com"
    rules:
      high_latency:
        threshold: 1.0  # seconds
        severity: "critical"
      high_error_rate:
        threshold: 0.05  # 5%
        severity: "warning"
      feature_drift:
        threshold: 0.2
        severity: "warning"

# Streaming Configuration
streaming:
  flink:
    job_manager: "flink-jobmanager:8081"
    parallelism: 8
    checkpoint_interval: 60000  # ms
    state_backend: "filesystem"
    state_checkpoints_dir: "s3://company-flink-checkpoints/"
  window_configs:
    tumbling_windows:
      - duration: 60000  # 1 minute
      - duration: 300000  # 5 minutes
    sliding_windows:
      - size: 300000  # 5 minutes
        slide: 60000   # 1 minute
    session_windows:
      - gap: 30000  # 30 seconds

# Resource Configuration
resources:
  api:
    requests:
      cpu: "500m"
      memory: "1Gi"
    limits:
      cpu: "2"
      memory: "2Gi"
  streaming:
    requests:
      cpu: "1000m"
      memory: "2Gi"
    limits:
      cpu: "4"
      memory: "4Gi"
  training:
    requests:
      cpu: "2000m"
      memory: "4Gi"
    limits:
      cpu: "8"
      memory: "8Gi"

# Backup & Disaster Recovery
backup:
  enabled: true
  schedule: "0 2 * * *"  # Daily at 2 AM
  retention_days: 30
  include:
    - "redis_snapshots"
    - "model_registry"
    - "feature_metadata"