apiVersion: apps/v1
kind: Deployment
metadata:
  name: voice-feature-store-api
  namespace: voice-analytics
spec:
  replicas: 3
  selector:
    matchLabels:
      app: voice-feature-store-api
  template:
    metadata:
      labels:
        app: voice-feature-store-api
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "8000"
        prometheus.io/path: "/metrics"
    spec:
      containers:
      - name: api
        image: your-registry/voice-feature-store:latest
        ports:
        - containerPort: 8000
        env:
        - name: ENVIRONMENT
          value: "production"
        - name: KAFKA_BOOTSTRAP_SERVERS
          value: "kafka-cluster:9092"
        - name: REDIS_HOST
          value: "redis-cluster"
        - name: AWS_ACCESS_KEY_ID
          valueFrom:
            secretKeyRef:
              name: aws-credentials
              key: access-key
        - name: AWS_SECRET_ACCESS_KEY
          valueFrom:
            secretKeyRef:
              name: aws-credentials
              key: secret-key
        resources:
          requests:
            memory: "512Mi"
            cpu: "250m"
          limits:
            memory: "1Gi"
            cpu: "500m"
        livenessProbe:
          httpGet:
            path: /health
            port: 8000
          initialDelaySeconds: 30
          periodSeconds: 10
        readinessProbe:
          httpGet:
            path: /health
            port: 8000
          initialDelaySeconds: 5
          periodSeconds: 5
---
apiVersion: v1
kind: Service
metadata:
  name: voice-feature-store-api
  namespace: voice-analytics
spec:
  selector:
    app: voice-feature-store-api
  ports:
  - port: 8000
    targetPort: 8000
  type: LoadBalancer
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: flink-feature-processor
  namespace: voice-analytics
spec:
  replicas: 2
  selector:
    matchLabels:
      app: flink-feature-processor
  template:
    metadata:
      labels:
        app: flink-feature-processor
    spec:
      containers:
      - name: flink-job
        image: your-registry/voice-feature-store:latest
        command: ["python", "-m", "voice_feature_store.streaming.flink_processor"]
        env:
        - name: ENVIRONMENT
          value: "production"
        - name: KAFKA_BOOTSTRAP_SERVERS
          value: "kafka-cluster:9092"
        - name: REDIS_HOST
          value: "redis-cluster"
        resources:
          requests:
            memory: "2Gi"
            cpu: "1000m"
          limits:
            memory: "4Gi"
            cpu: "2000m"