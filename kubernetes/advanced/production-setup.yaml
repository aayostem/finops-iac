apiVersion: v1
kind: ConfigMap
metadata:
  name: voice-feature-store-config
  namespace: voice-analytics
data:
  production.yaml: |
    # Embedded production configuration
    environment: "production"
    kafka:
      bootstrap_servers: "kafka-cluster:9092"
    redis:
      host: "redis-cluster"
    # ... rest of production config
---
apiVersion: v1
kind: Secret
metadata:
  name: voice-feature-store-secrets
  namespace: voice-analytics
type: Opaque
data:
  redis-password: <base64-encoded-redis-password>
  jwt-secret-key: <base64-encoded-jwt-secret>
  aws-access-key-id: <base64-encoded-aws-key>
  aws-secret-access-key: <base64-encoded-aws-secret>
  slack-webhook-url: <base64-encoded-slack-webhook>
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: voice-feature-store-api
  namespace: voice-analytics
  labels:
    app: voice-feature-store-api
    version: v2.0.0
spec:
  replicas: 4
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  selector:
    matchLabels:
      app: voice-feature-store-api
  template:
    metadata:
      labels:
        app: voice-feature-store-api
        version: v2.0.0
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "8000"
        prometheus.io/path: "/metrics"
        config-checksum: {{ include "config-checksum" . }}
    spec:
      serviceAccountName: voice-feature-store
      containers:
      - name: api
        image: your-registry/voice-feature-store:{{ .Values.image.tag }}
        imagePullPolicy: IfNotPresent
        ports:
        - containerPort: 8000
          name: http
        env:
        - name: ENVIRONMENT
          value: "production"
        - name: CONFIG_PATH
          value: "/app/config/production.yaml"
        - name: REDIS_PASSWORD
          valueFrom:
            secretKeyRef:
              name: voice-feature-store-secrets
              key: redis-password
        - name: JWT_SECRET_KEY
          valueFrom:
            secretKeyRef:
              name: voice-feature-store-secrets
              key: jwt-secret-key
        - name: AWS_ACCESS_KEY_ID
          valueFrom:
            secretKeyRef:
              name: voice-feature-store-secrets
              key: aws-access-key-id
        - name: AWS_SECRET_ACCESS_KEY
          valueFrom:
            secretKeyRef:
              name: voice-feature-store-secrets
              key: aws-secret-access-key
        volumeMounts:
        - name: config-volume
          mountPath: /app/config
        resources:
          requests:
            memory: "1Gi"
            cpu: "500m"
          limits:
            memory: "2Gi"
            cpu: "2"
        livenessProbe:
          httpGet:
            path: /health
            port: 8000
          initialDelaySeconds: 30
          periodSeconds: 10
          timeoutSeconds: 5
          failureThreshold: 3
        readinessProbe:
          httpGet:
            path: /health
            port: 8000
          initialDelaySeconds: 5
          periodSeconds: 5
          timeoutSeconds: 3
        startupProbe:
          httpGet:
            path: /health
            port: 8000
          initialDelaySeconds: 10
          periodSeconds: 10
          failureThreshold: 10
      volumes:
      - name: config-volume
        configMap:
          name: voice-feature-store-config
      affinity:
        podAntiAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
          - weight: 100
            podAffinityTerm:
              labelSelector:
                matchExpressions:
                - key: app
                  operator: In
                  values:
                  - voice-feature-store-api
              topologyKey: kubernetes.io/hostname
      tolerations:
      - key: "dedicated"
        operator: "Equal"
        value: "ml-workloads"
        effect: "NoSchedule"
---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: voice-feature-store-api-hpa
  namespace: voice-analytics
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: voice-feature-store-api
  minReplicas: 3
  maxReplicas: 10
  metrics:
  - type: Resource
    resource:
      name: cpu
      target:
        type: Utilization
        averageUtilization: 70
  - type: Resource
    resource:
      name: memory
      target:
        type: Utilization
        averageUtilization: 80
  behavior:
    scaleDown:
      stabilizationWindowSeconds: 300
      policies:
      - type: Percent
        value: 50
        periodSeconds: 60
    scaleUp:
      stabilizationWindowSeconds: 60
      policies:
      - type: Percent
        value: 100
        periodSeconds: 30
---
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: voice-feature-store-api-pdb
  namespace: voice-analytics
spec:
  minAvailable: 2
  selector:
    matchLabels:
      app: voice-feature-store-api
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: voice-feature-store-api-policy
  namespace: voice-analytics
spec:
  podSelector:
    matchLabels:
      app: voice-feature-store-api
  policyTypes:
  - Ingress
  - Egress
  ingress:
  - from:
    - namespaceSelector:
        matchLabels:
          name: ingress
    ports:
    - protocol: TCP
      port: 8000
  egress:
  - to:
    - namespaceSelector:
        matchLabels:
          name: kafka
    ports:
    - protocol: TCP
      port: 9092
  - to:
    - namespaceSelector:
        matchLabels:
          name: redis
    ports:
    - protocol: TCP
      port: 6379
---
apiVersion: batch/v1
kind: CronJob
metadata:
  name: feature-store-backup
  namespace: voice-analytics
spec:
  schedule: "0 2 * * *"
  concurrencyPolicy: Forbid
  jobTemplate:
    spec:
      template:
        spec:
          serviceAccountName: voice-feature-store
          containers:
          - name: backup
            image: your-registry/voice-feature-store:{{ .Values.image.tag }}
            command: ["python", "-m", "scripts.backup_manager"]
            env:
            - name: ENVIRONMENT
              value: "production"
            - name: AWS_ACCESS_KEY_ID
              valueFrom:
                secretKeyRef:
                  name: voice-feature-store-secrets
                  key: aws-access-key-id
            - name: AWS_SECRET_ACCESS_KEY
              valueFrom:
                secretKeyRef:
                  name: voice-feature-store-secrets
                  key: aws-secret-access-key
            resources:
              requests:
                memory: "512Mi"
                cpu: "200m"
              limits:
                memory: "1Gi"
                cpu: "500m"
          restartPolicy: OnFailure